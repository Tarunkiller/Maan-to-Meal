<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart — Maan-Meal</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <style>
    .cart-layout{display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start}
    .cart-item{display:flex;gap:1rem;padding:1rem;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-md);transition:var(--transition)}
    .cart-item:hover{background:var(--bg-card-hover)}
    .cart-img{width:80px;height:80px;object-fit:cover;border-radius:var(--radius-sm);flex-shrink:0}
    .qty-control{display:flex;align-items:center;gap:0.5rem;background:var(--bg-mid);border-radius:20px;padding:2px}
    .qty-btn{width:28px;height:28px;border-radius:50%;border:none;background:var(--glass);color:var(--text-primary);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
    .qty-btn:hover{background:var(--primary);color:#fff}
    .order-summary{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-md);padding:1.5rem;position:sticky;top:90px}
    @media(max-width:900px){.cart-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="bg-animated"></div>

<nav class="navbar">
  <a href="/frontend/index.html" class="navbar-brand"><span class="brand-icon">🌾</span><span>Maan-Meal</span></a>
  <div class="navbar-nav">
    <a href="/frontend/consumer/browse.html" class="nav-link">← Continue Shopping</a>
  </div>
  <div class="navbar-actions">
    <span id="nav-user-name" style="font-weight:600;font-size:0.9rem;color:var(--primary-light)"></span>
    <button class="btn btn-ghost btn-sm" id="nav-logout">Logout</button>
  </div>
</nav>

<div class="container" style="padding:2rem">
  <h1 style="font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:1.5rem">🛒 Your Cart</h1>

  <div class="cart-layout">
    <!-- Cart Items -->
    <div>
      <div id="cart-items-list" style="display:flex;flex-direction:column;gap:1rem"></div>

      <!-- Empty State -->
      <div id="cart-empty" class="empty-state hidden">
        <div class="empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Add some fresh produce from our farmers!</p>
        <a href="/frontend/consumer/browse.html"><button class="btn btn-primary">Browse Products</button></a>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="order-summary" id="order-summary">
      <h3 style="font-weight:700;margin-bottom:1.5rem">Order Summary</h3>
      <div style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.5rem" id="summary-lines"></div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:800;margin:1rem 0">
        <span>Total</span>
        <span id="cart-total" style="color:var(--harvest)">₹0.00</span>
      </div>
      <div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:0.75rem;font-size:0.82rem;color:var(--success);margin-bottom:1rem">
        ⚡ Free delivery on orders above ₹500 &bull; Delivered within 24 hours
      </div>
      <button class="btn btn-accent btn-full btn-lg" id="checkout-btn" onclick="goCheckout()">Proceed to Checkout →</button>
      <button class="btn btn-ghost btn-sm btn-full mt-2" style="color:var(--danger)" onclick="clearCart()">🗑 Clear Cart</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/frontend/js/app.js"></script>
<script>
  if (!Auth.requireRole('consumer')) {}

  let cartData = null;

  async function loadCart() {
    try {
      cartData = await Api.get('/consumer/cart');
      renderCart(cartData);
    } catch(e) { Toast.show('Failed to load cart', 'error'); }
  }

  function renderCart(data) {
    const list = document.getElementById('cart-items-list');
    const empty = document.getElementById('cart-empty');
    const summary = document.getElementById('order-summary');
    const totalEl = document.getElementById('cart-total');
    const summaryLines = document.getElementById('summary-lines');

    if (!data.items.length) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      summary.style.display = 'none';
      return;
    }

    empty.classList.add('hidden');
    summary.style.display = 'block';

    list.innerHTML = data.items.map(item => {
      const p = item.product;
      if (!p) return '';
      return `
        <div class="cart-item" id="cart-item-${item.id}">
          <img class="cart-img" src="${p.image_url}" alt="${p.name}" onerror="this.src='/frontend/static/uploads/default_product.jpg'">
          <div style="flex:1">
            <div style="font-weight:700">${p.name}</div>
            <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem">🌾 ${p.farm_name || 'Farm Fresh'} &bull; ${p.category}</div>
            <div style="color:var(--harvest);font-weight:700">${Fmt.currency(p.price_per_unit)} / ${p.unit}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem">
            <div style="font-weight:700;font-size:0.9rem">${Fmt.currency(p.price_per_unit * item.quantity)}</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
              <span style="font-weight:700;min-width:30px;text-align:center">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
            </div>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger);padding:0.2rem 0.5rem" onclick="removeItem(${item.id})">✕ Remove</button>
          </div>
        </div>`;
    }).join('');

    totalEl.textContent = Fmt.currency(data.total);

    summaryLines.innerHTML = data.items.map(item => {
      const p = item.product;
      if (!p) return '';
      return `<div style="display:flex;justify-content:space-between;font-size:0.88rem">
        <span style="color:var(--text-muted)">${p.name} × ${item.quantity}</span>
        <span>${Fmt.currency(p.price_per_unit * item.quantity)}</span>
      </div>`;
    }).join('');
  }

  async function updateQty(itemId, newQty) {
    if (newQty <= 0) { removeItem(itemId); return; }
    try {
      await Api.put(`/consumer/cart/${itemId}`, { quantity: newQty });
      loadCart();
    } catch(e) { Toast.show(e.message, 'error'); }
  }

  async function removeItem(itemId) {
    try {
      await Api.delete(`/consumer/cart/${itemId}`);
      Toast.show('Item removed', 'info');
      loadCart();
    } catch(e) { Toast.show(e.message, 'error'); }
  }

  async function clearCart() {
    if (!confirm('Clear entire cart?')) return;
    try {
      await Api.delete('/consumer/cart/clear');
      loadCart();
    } catch(e) { Toast.show(e.message, 'error'); }
  }

  function goCheckout() {
    if (!cartData || !cartData.items.length) { Toast.show('Cart is empty', 'warning'); return; }
    window.location.href = '/frontend/consumer/checkout.html';
  }

  document.addEventListener('DOMContentLoaded', loadCart);
</script>
</body>
</html>
